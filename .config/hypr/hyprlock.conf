# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

general {
    hide_cursor = false
}

background {
    monitor =
    path = ~/Pictures/Wallpaper/wallhaven-0wjvrn.jpg
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

animations {
    animation = fade,    1, 6, default
    animation = fadeIn,  1, 6, default
    animation = fadeOut, 1, 6, default
}

input-field {
    monitor =
    size = 250, 55
    position = 0, -145
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.4
    font_color = rgb(200, 200, 200)

    hide_input = false
    inner_color = rgba(100, 114, 125, 0.4)
    outer_color = rgba(0, 0, 0, 0)

    # shadow_passes = 1
    # shadow_size = 2

    fade_on_empty = false
    rounding = -1

    font_family = SF Pro Display Bold Italic
    placeholder_text = <span foreground="##ffffff99">Enter Password</span>
    fail_text = $PAMFAIL

    # uncomment if you wish to display a message during authentication
    # check_text = Authenticating...
}

# Lock Icon
label {
    monitor =
    text = <span> </span>
    color = rgba(216, 222, 233, 0.70)
    font_size = 24
    font_family = SF Pro Display Bold
    position = 2, -195
    halign = center
    valign = top
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(216, 222, 233, 0.70)
    font_size = 140
    font_family = SF Pro Display Bold
    position = 0, 180
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 30
    font_family = SF Pro Display Bold
    position = 0, 75
    halign = center
    valign = center
}

# Username greeting
label {
    monitor =
    text = Hi, $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 24
    font_family = SF Pro Display Bold Italic
    position = 0, -35
    halign = center
    valign = center
}
